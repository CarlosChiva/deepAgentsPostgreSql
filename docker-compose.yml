# Docker Compose configuration for the deepagent-postgres project.
# Defines the PostgreSQL database service, Ollama (LLM) service, and the Chat API service,
# connected via a shared network with persistent data storage.

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5440:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
  

  # Chat API application
  chat-api:
    build:
      context: ./services/chat-api
      dockerfile: Dockerfile
    # ports:
    #   - "8000:8000"
    network_mode: "host"
    depends_on:
      postgres:
        condition: service_healthy



# Named volumes for data persistence
volumes:
  pgdata:

